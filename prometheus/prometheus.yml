global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ocr-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s

  - job_name: 'advanced-ocr'
    static_configs:
      - targets: ['advanced-ocr:8000']
    metrics_path: '/api/metrics'

  - job_name: 'celery-exporter'
    static_configs:
      - targets: ['celery_worker:8000']
