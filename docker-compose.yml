services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '8001:8000'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ocr_user
      - DB_PASSWORD=ocr_secure_password
      - DB_NAME=ocr_service
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32-byte-encryption-key-here!!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./dashboard.html:/app/dashboard.html:ro
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - ocr-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info", "-Q", "ocr"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ocr_user
      - DB_PASSWORD=ocr_secure_password
      - DB_NAME=ocr_service
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32-byte-encryption-key-here!!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - ocr-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocr_service
      POSTGRES_USER: ocr_user
      POSTGRES_PASSWORD: ocr_secure_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ocr_user -d ocr_service']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ocr-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - ocr-network

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dashboard.html:/usr/share/nginx/html/dashboard.html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ocr-network

volumes:
  postgres_data:
  redis_data:

networks:
  ocr-network:
    driver: bridge
