services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    ports:
      - '8001:8000'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - ocr-network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env.prod
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info", "-Q", "ocr"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - ocr-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocr_service_db
      POSTGRES_USER: ocr_service
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ocr_secure_password}
    volumes:
      - ocr_pgdata_prod:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ocr_service -d ocr_service_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ocr-network

  redis:
    image: redis:7-alpine
    volumes:
      - ocr_redisdata_prod:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - ocr-network

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dashboard.html:/usr/share/nginx/html/dashboard.html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - ocr-network

volumes:
  ocr_pgdata_prod:
  ocr_redisdata_prod:

networks:
  ocr-network:
    driver: bridge
